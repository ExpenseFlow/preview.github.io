<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpenseFlow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 500px;
      width: 90%;
      text-align: center;
    }

    .logo {
      margin-bottom: 32px;
    }

    .logo img {
      width: 80px;
      height: 80px;
    }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 48px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1a1a1a;
    }

    .subtitle {
      font-size: 16px;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .country-grid {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    .country-option {
      padding: 16px 20px;
      border: 2px solid #e5e5e5;
      border-radius: 8px;
      background: #f9f9f9;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .country-option:hover {
      border-color: #d4a574;
      background: #fef8f3;
    }

    .country-option.selected {
      border-color: #d4a574;
      background: #fef8f3;
      font-weight: 600;
    }

    .country-option .flag {
      margin-right: 12px;
      font-size: 20px;
    }

    .country-info {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
      margin-left: 32px;
    }

    .btn-continue {
      width: 100%;
      padding: 14px 24px;
      background: #d4a574;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 16px;
    }

    .btn-continue:hover {
      background: #c99560;
    }

    .btn-continue:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loading {
      color: #666;
      font-size: 14px;
      margin-top: 16px;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #e5e5e5;
      border-top-color: #d4a574;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error {
      color: #d32f2f;
      font-size: 14px;
      margin-top: 12px;
      padding: 12px;
      background: #ffebee;
      border-radius: 6px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .countdown {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e5e5e5;
      font-size: 14px;
      color: #888;
      text-align: center;
    }

    .countdown strong {
      color: #d4a574;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg width="80" height="80" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="512" rx="110" fill="#d4a574"/>
        <path d="M220 180L220 340M220 180C220 140 260 130 300 130C320 130 330 145 330 160M220 340C220 380 260 390 300 390C320 390 330 375 330 360M330 160V360M160 260H340" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="modal">
      <h1>Welcome to ExpenseFlow</h1>
      <p class="subtitle">Select your country to get started</p>

      <div class="loading" id="loading">
        <span class="spinner"></span>Detecting your location...
      </div>

      <div class="country-grid" id="countryGrid" style="display: none;">
        <!-- Will be populated by JavaScript -->
      </div>

      <button class="btn-continue" id="continueBtn" style="display: none;">Continue</button>

      <div class="countdown" id="countdown" style="display: none;">
        Auto-redirect in <strong id="countdownValue">5</strong> seconds
      </div>

      <div class="error" id="error"></div>
    </div>
  </div>

  <script>
    const SUPPORTED_COUNTRIES = {
      CA: {
        name: 'Canada',
        flag: '🍁',
        url: './ca-en/',
        tax: 'CRA',
      },
      US: {
        name: 'United States',
        flag: '🇺🇸',
        url: './us-en/',
        tax: 'IRS',
      },
      en: {
        name: 'Other Jurisdictions',
        flag: '🌐',
        url: './en/',
        tax: null,
      },
    };

    const showSelector = new URLSearchParams(location.search).get('select') === '1';
    let selectedCountry = null;

    async function init() {
      if (showSelector) {
        // Mode B: Country selector modal
        const saved = localStorage.getItem('expenseflow_country');
        if (saved && SUPPORTED_COUNTRIES[saved]) {
          selectedCountry = saved;
        } else {
          selectedCountry = 'CA'; // default if nothing saved
        }
        renderModal();
      } else {
        // Mode A: Auto-redirect
        const saved = localStorage.getItem('expenseflow_country');
        if (saved && SUPPORTED_COUNTRIES[saved]) {
          redirect(saved);
          return;
        }

        // Try to detect country from IP
        try {
          const response = await fetch('https://ipapi.co/json/', {
            method: 'GET',
            headers: { 'Accept': 'application/json' }
          });

          if (response.ok) {
            const data = await response.json();
            const detectedCountry = data.country_code;

            if (SUPPORTED_COUNTRIES[detectedCountry]) {
              redirect(detectedCountry);
            } else {
              redirect('en');
            }
          } else {
            redirect('en');
          }
        } catch (error) {
          console.error('Geolocation detection failed:', error);
          redirect('en');
        }
      }
    }

    function renderModal() {
      const grid = document.getElementById('countryGrid');
      grid.innerHTML = '';

      Object.entries(SUPPORTED_COUNTRIES).forEach(([code, country]) => {
        const option = document.createElement('div');
        option.className = 'country-option' + (code === selectedCountry ? ' selected' : '');
        let html = `
          <div>
            <span class="flag">${country.flag}</span>
            <strong>${country.name}</strong>
          </div>`;
        if (country.tax) {
          html += `<div class="country-info">Tax authority: ${country.tax}</div>`;
        }
        option.innerHTML = html;
        option.addEventListener('click', () => selectCountry(code));
        grid.appendChild(option);
      });

      // Show modal, hide loading and spinner
      document.getElementById('countryGrid').parentElement.style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('continueBtn').style.display = 'none';
      document.getElementById('countdown').style.display = 'none';
    }

    function selectCountry(code) {
      redirect(code);
    }

    function redirect(code) {
      if (SUPPORTED_COUNTRIES[code]) {
        localStorage.setItem('expenseflow_country', code);
        window.location.href = SUPPORTED_COUNTRIES[code].url;
      }
    }

    // Start
    init();
  </script>
</body>
</html>
